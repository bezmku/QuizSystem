<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="quize.css">

    <title>Questions</title>
</head>
<body>
    <h1 id="subject">Subject where the questions where taken from</h1>
    <div id="full-card">
           <h2 id="question" >what are the main life forms that exist on planet and which of them belong life of oceans and seas?</h2>
           <div id="choices-btn-container" class="btn-grid">
               <button id="choice1" class="choice-btn">option one</button>
               <button id="choice2" class="choice-btn">option two</button>
               <button id="choice3" class="choice-btn">option three</button>
               <button id="choice4" class="choice-btn">option four</button>
           </div>

           <div id="controls">
            <button id="next-btn" class="next-btn-hide">Next</button>
            <button id="quit" >Quit</button>
            <button id="finish" >Submit</button>
           </div>
    </div>
    <script src="quiz.js"></script>
</body>
</html>
