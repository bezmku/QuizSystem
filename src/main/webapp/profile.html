<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile | QUIZHUB</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <style>
        .profile-card{
            background: white;
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 20px;
            width:50%;
            align-content: center;
        }
        .profile-header{
            padding:10px;
            border-radius: 10px;
            margin:5px;
            background:white;
            border:1px solid var(--border)
        }
        .profile-avatar{
            background: var(--header-bg);
            width:fit-content;
            padding:10px;
            border-radius: 50%;
            font-size: 2rem;
            color:white;
            margin:5px;
        }
        .display-username{
            font-size:1.5rem;
            color: #556eac;
        }
        .profile-info{
            padding:10px;
            margin-bottom:10px;
            border-radius:10px;
            border:1px solid var(--border);
        }
        .info-label{
            padding:5px;
            margin:5px;
            font-size:1.2rem;
        }
        .info-value{
            font-size:1.3rem;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">QUIZ<span>HUB</span></div>
    <nav>
        <a href="logout" style="color:#e74c3c;">Logout</a>
    </nav>
</header>

<div class="layout-wrapper">
    <aside>
        <div class="user-info" style="margin-bottom: 2rem; padding:10px;">
            <p>Logged in as: <strong>Instructor</strong></p>
        </div>
        <ul class="side-nav">
            <li><a href="" id="dashboard">Dashboard</a></li>
            <li><a href="profile.html" class="active">My Profile</a></li>
        </ul>
    </aside>
    <main>
        <div class="profile-card">
            <div class="profile-header">
              <div class="profile-avatar">U</div>
              <h3 id="displayUsername" class="display-username">username</h3>
            </div>

            <div class="profile-body">
                <div class="profile-info">
                    <div class="info-label ">Role</div>
                    <div class="info-value role">Teacher or student</div>
                </div>
                <div class="profile-info">
                    <div class="info-label ">Email</div>
                    <div class="info-value email ">user@gmail.com</div>
                </div>
                <div  class="profile-info">
                    <div class="info-label">Account Status</div>
                    <div class="info-value">Active</div>
                </div>
            </div>
        </div>

    </main>
</div>
<script src="assets/js/profile.js"></script>
</body>
</html>
