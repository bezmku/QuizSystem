<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="signup.css">
    <title>Sign UP</title>
</head>
<body>
    <div id="container">
        <h2 id="signup-text">SIGN UP</h2>
        <div id="form-container">
            <form id="signup-form">
               <label for="username">Username:</label>
               <input type="text" id="username" name="username" placeholder="Enter username" required><br>

               <label for="email">Email:</label>
               <input type="email" id="email" name="email" placeholder="Enter email" required><br>

               <label for="password">Password</label>
               <input type="password" id="password" name="password" placeholder="Enter password" required><br>
  
               <label for="role">Role:</label>
              <input type="radio" id="student" name="role" value="student" checked>Student</input>
              <input type="radio" id="teacher" name="role" value="teacher">Teacher</input><br>

              <button id="submit-btn" type="submit">SIGN UP</button>
         </form>
        </div>
        <p >Already have account? <a href="signin.html"> SIGN IN</a></p>
    </div>

    <script src="auth.js"></script>
</body>
</html>
